services:
  mock-mealie:
    image: python:3.12-slim
    command: ["python", "/mock_mealie.py"]
    volumes:
      - ./tests/mock_mealie.py:/mock_mealie.py:ro
    expose:
      - "9000"

  mealie-mcp-server:
    build:
      context: .
    environment:
      MEALIE_BASE_URL: http://mock-mealie:9000
      MEALIE_API_KEY: mock-api-key
      LOG_LEVEL: INFO
      MCP_HOST: 0.0.0.0
      MCP_PORT: 8000
      MCP_PATH: /mcp
      MCP_ALLOWED_SUBNETS: ""
    ports:
      - "8000:8000"
    depends_on:
      - mock-mealie
